name: Release

# Build a single-file mdmore.exe and attach it to a GitHub Release
# whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Single-file / self-contained settings live in mdmore.csproj (Release config).
      - name: Publish single-file exe
        run: dotnet publish mdmore.csproj -c Release -r win-x64 -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdmore-win-x64
          path: publish/mdmore.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/mdmore.exe
          generate_release_notes: true
