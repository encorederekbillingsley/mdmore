stages:
  - build

build-windows:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    # Single-file / self-contained settings live in mdmore.csproj (Release config).
    - dotnet publish mdmore.csproj -c Release -r win-x64 -o publish/
  artifacts:
    name: mdmore-win-x64
    paths:
      - publish/mdmore.exe
    expire_in: 30 days
  tags:
    - docker-exec
  only:
    - main
    - tags
